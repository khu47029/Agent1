services:
  - type: web
    name: pragati-agent-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ALLOWED_ORIGINS
        value: https://pragatisahayak.in,https://www.pragatisahayak.in,https://khu47029.github.io
